name: CI
on: [push]

jobs:
  typos:
    name: Check for typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.22.9

  build:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run generate-icons
      - name: Check generated files are up to date
        run: |
          git diff --exit-code || (echo "Generated icons are out of date. Run 'bun run generate-icons' and commit." && exit 1)
      - run: bun run check
      - run: bun run build
